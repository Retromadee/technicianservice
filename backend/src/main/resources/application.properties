# ============================================
# HomeFix Pro - Application Configuration
# ============================================

spring.application.name=HomeFix Pro

# Server
server.port=8081

# ---- PostgreSQL (primary) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/homefixdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ---- H2 (secondary/test) ----
# spring.datasource.url=jdbc:h2:mem:homefixdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ---- JWT ----
app.jwt.secret=HomeFix_Pro_Super_Secret_Key_256bit_Change_This_In_Production_2026
app.jwt.expiration-ms=86400000

# ---- AI API Keys (replace with real keys) ----
app.ai.openai-api-key=YOUR_OPENAI_API_KEY
app.ai.google-vision-api-key=YOUR_GOOGLE_VISION_API_KEY

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ---- CORS ----
app.cors.allowed-origins=http://localhost:8080,http://localhost:3000
